<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Ernesto Moser - Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================
           STYLES
           ========================= */
        
        :root {
            --bg-color: #acacac; /* Initial matte grey canvas */
            --text-color: #1a1a1a;
            --accent-color: #df5d22; /* Burnt orange */
            --sidebar-width: 60px;
            --padding-mobile: 24px;
            --padding-desktop: 40px;
        }

        /* Complete style inversion: Grey vanishes into premium dark obsidian */
        body.content-revealed {
            --bg-color: #141414;
            --text-color: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            transition: background-color 0.6s cubic-bezier(0.25, 1, 0.5, 1), color 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        /* Layout */
        #main-content {
            margin-right: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Sidebar Activation Mechanism */
        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        #sidebar:hover {
            background-color: #c44f1b;
        }

        .sidebar-text {
            writing-mode: vertical-rl;
            color: #1a1a1a; 
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            user-select: none;
        }

        /* Monogram Container (Centered on Initial Canvas) */
        #monogram-container {
            padding: var(--padding-mobile);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .monogram-svg {
            width: 140px;
            height: auto;
        }

        /* Absolute Disappearance: Monogram completely purges from layout on activation */
        body.content-revealed #monogram-container {
            display: none !important;
        }

        #dynamic-portfolio-content {
            display: none; 
            flex-direction: column;
            width: 100%;
            position: relative;
        }

        body.content-revealed #dynamic-portfolio-content {
            display: flex;
        }

        /* Structural Dismissal Interface (The "X" Control)
           Optimized to be larger and leaner exactly as depicted in image_2.png */
        #close-canvas-trigger {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 56px;  
            height: 56px; 
            z-index: 90;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent; 
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 0.8;
        }

        #close-canvas-trigger:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        #close-canvas-trigger svg {
            width: 100%;
            height: 100%;
            stroke: #f5f5f5;
            stroke-width: 1px; 
            stroke-linecap: round;
        }

        /* Hero Section (CRT TV / Video Simulation) */
        #hero {
            width: 100%;
            position: relative;
            background-color: #050505;
            overflow: hidden;
        }

        .crt-viewport {
            width: 100%;
            height: 80vh;
            position: relative;
            overflow: hidden;
        }

        .crt-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: filter 0.5s ease;
        }

        .crt-frame.active {
            opacity: 1;
        }

        /* CRT Effects Layers */
        .crt-scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        .crt-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 11;
            pointer-events: none;
        }

        .glitching .crt-flicker {
            animation: crt-flicker-anim 0.15s infinite;
        }

        .glitching .crt-frame.active {
            animation: crt-displacement 0.1s infinite;
            filter: contrast(1.7) brightness(1.2) grayscale(1);
        }

        /* Absolute Monochrome Presentation: Transition elements match stark black and white aesthetic */
        .final-state .crt-frame {
            filter: grayscale(1) contrast(1.15) brightness(1.05);
        }

        @keyframes crt-flicker-anim {
            0% { opacity: 0.15; }
            50% { opacity: 0.02; }
            100% { opacity: 0.2; }
        }

        @keyframes crt-displacement {
            0% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(-2px, 1px) scale(1.01); }
            40% { transform: translate(1px, -1px) scale(1.005); }
            60% { transform: translate(-1px, -2px) scale(1.015) skewX(1deg); }
            80% { transform: translate(2px, 2px) scale(1); }
            100% { transform: translate(0, 0) scale(1.002); }
        }

        .hero-credit {
            font-size: 0.75rem;
            padding: 16px var(--padding-mobile);
            color: #888;
            background-color: var(--bg-color);
            transition: background-color 0.6s ease;
        }

        /* About Section */
        #about {
            padding: 40px var(--padding-mobile) 40px var(--padding-mobile);
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 850px;
            letter-spacing: -0.01em;
        }

        #about strong {
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Contact Section Container */
        #contact-container {
            margin-top: 20px;
        }

        #contact-banner {
            background-color: var(--accent-color);
            padding: 24px var(--padding-mobile);
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .banner-link {
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
        }

        .references-link {
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Structural Isolation: State toggles targeting the complete erasure of 
           the about section and image layout when the separate work interface is opened */
        body.work-section-open #hero,
        body.work-section-open #about {
            display: none !important;
        }

        /* Completely Separate Standalone Subsection 
           Reflecting the structural composition requested from image_3.png */
        #work-references-section {
            display: none;
            padding: 80px var(--padding-mobile);
            background-color: #1c1c1c;
            border-top: 1px solid #2a2a2a;
            animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        body.work-section-open #work-references-section {
            display: block;
        }

        /* Content block matching the layout hierarchy structure viewed in image_3.png */
        .work-list-group {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 850px;
        }

        .work-item-row {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #f5f5f5;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        #footer {
            padding: 40px var(--padding-mobile) 48px var(--padding-mobile);
            display: flex;
            gap: 16px;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-color);
            transition: transform 0.2s ease, fill 0.6s ease;
        }

        .social-icon:hover {
            transform: scale(1.05);
            fill: var(--accent-color);
        }

        /* Dynamic Entry Fade */
        .reveal {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive Adjustments */
        @media (min-width: 768px) {
            :root {
                --sidebar-width: 80px;
            }
            .sidebar-text {
                font-size: 1.8rem;
            }
            #close-canvas-trigger {
                top: 40px;
                right: 40px;
                width: 64px;  
                height: 64px;
            }
            #contact-banner {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding-left: var(--padding-desktop);
                padding-right: var(--padding-desktop);
                gap: 0;
            }
            .hero-credit, #work-references-section {
                padding-left: var(--padding-desktop);
                padding-right: var(--padding-desktop);
            }
            #about, #footer {
                padding-left: var(--padding-desktop);
                padding-right: var(--padding-desktop);
            }
            #about {
                font-size: 1.35rem;
                line-height: 1.8;
                padding-top: 60px;
            }
            .monogram-svg {
                width: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar Trigger Configuration -->
    <aside id="sidebar" onclick="activatePortfolio()">
        <div class="sidebar-text" id="sidebar-title"></div>
    </aside>

    <main id="main-content">
        <!-- Flowery & Manly Brutalist Botanical Monogram -->
        <div id="monogram-container">
            <svg class="monogram-svg" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
                <!-- Central Heavy Stem -->
                <line x1="60" y1="15" x2="60" y2="145" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
                
                <!-- Right Side: Massive D-Enclosure Curve -->
                <path d="M 60,25 C 115,25 115,70 115,90 C 115,115 90,135 60,135" 
                      fill="none" 
                      stroke="#1a1a1a" 
                      stroke-width="7.5" 
                      stroke-linecap="round"/>
                
                <!-- Left Side: Aggressive Sharp Interlocking Bud Curve -->
                <path d="M 60,40 C 20,50 15,80 30,105 C 40,120 52,128 60,130" 
                      fill="none" 
                      stroke="#df5d22" 
                      stroke-width="7.5" 
                      stroke-linecap="round"/>
                
                <!-- Triple Horizontal Organic Prongs (E-Masking) -->
                <line x1="38" x2="82" y1="65" y2="65" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
                <line x1="45" x2="75" y1="85" y2="85" stroke="#df5d22" stroke-width="5" stroke-linecap="round"/>
                <line x1="38" x2="82" y1="105" y2="105" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
                
                <!-- Root Base Angled Split (M-Foundation) -->
                <path d="M 35,145 L 60,115 L 85,145" 
                      fill="none" 
                      stroke="#1a1a1a" 
                      stroke-width="7.5" 
                      stroke-linecap="round" 
                      stroke-linejoin="round"/>
            </svg>
        </div>

        <!-- Dynamic Context Container (Revealed upon interaction) -->
        <div id="dynamic-portfolio-content">
            <!-- Global structural dismiss button configured to stay accessible and cleanly lean -->
            <div id="close-canvas-trigger" onclick="deactivatePortfolio(event)" aria-label="Close portfolio view">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>

            <section id="hero"></section>
            
            <section id="about" class="reveal"></section>
            
            <!-- Contact Bar containing the navigation anchor -->
            <section id="contact-container" class="reveal">
                <div id="contact-banner">
                    <div><a href='mailto:hello@danielmoser.me' class='banner-link'>contact</a> for inquiries</div>
                    <div>
                        <span class="references-link" id="toggle-work-btn" onclick="toggleReferences()">See work references</span>
                    </div>
                </div>
            </section>

            <!-- Completely separate standalone section deep in the layout flow -->
            <section id="work-references-section">
                <div class="work-list-group">
                    <div class="work-item-row">Light folding into form, then forgetting its edges.</div>
                    <div class="work-item-row">A surface thinking about becoming something else.</div>
                    <div class="work-item-row">Space held briefly, before it decides to dissolve.</div>
                </div>
            </section>

            <footer id="footer" class="reveal"></footer>
        </div>
    </main>

    <script>
        /* =========================
           CONFIG / CONTENT
           ========================= */
        
        const CONTENT = {
            siteName: "daniel ernesto moser",
            hero: {
                imageA: "IMG_3366.jpeg", 
                imageB: "IMG_3367.jpeg", 
                altA: "Atmospheric landscape frame",
                altB: "Daniel Ernesto Moser portrait frame",
                credit: "Sequence: Transmission 01 // Structural Dynamics & Human Form"
            },
            about: "My work is driven by a fundamental curiosity about how thoughtful environments are built and experienced. I explore the intersection of <strong>systemic functionality</strong> and <strong>tangible aesthetics</strong>, blending a perspective on urbanity with a deep appreciation for architectural form, design, and craftsmanship. This platform serves as a curated intersection of these disciplines, focusing on the enduring principles that give both large-scale structures and intimate spaces and forms their substance and character.",
            socials: [
                { 
                    name: "Instagram", 
                    url: "https://www.instagram.com/dan.unofficial?igsh=bHN6NzA0dXd2MW02&utm_source=qr", 
                    iconSvg: '<svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 5.523 4.477 10 10 10s10-4.477 10-10c0-5.523-4.477-10-10-10zm3.955 14h-7.91C6.917 16 6 15.083 6 13.955v-3.91C6 8.917 6.917 8 8.045 8h7.91C17.083 8 18 8.917 18 10.045v3.91C18 15.083 17.083 16 15.955 16zM12 9.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zm3.5-.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>' 
                },
                { 
                    name: "LinkedIn", 
                    url: "https://www.linkedin.com/in/danielernestomoser?utm_source=share_via&utm_content=profile&utm_medium=member_ios", 
                    iconSvg: '<svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 5.523 4.477 10 10 10s10-4.477 10-10c0-5.523-4.477-10-10-10zM8.5 16.5h-2v-6h2v6zm-1-7.2c-.66 0-1.2-.54-1.2-1.2s.54-1.2 1.2-1.2 1.2.54 1.2 1.2-.54 1.2-1.2 1.2zm9 7.2h-2v-3.5c0-1.42-1.5-1.18-1.5 0v3.5h-2v-6h2v.84c1.1-1.04 3.5-.8 3.5 2.26v2.9z"/></svg>' 
                },
                {
                    name: "X",
                    url: "https://x.com/_dmoser?s=11",
                    iconSvg: '<svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.2 14h-1.8l-2.6-3.6-2.6 3.6H6.4l3.4-4.5-3.2-4.5h1.8l2.2 3.1 2.2-3.1h1.8l-3 4.1 3.4 4.9z"/></svg>'
                }
            ]
        };

        /* =========================
           INITIALIZATION
           ========================= */
        
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('sidebar-title').innerText = CONTENT.siteName;
            initHeroElements();
            document.getElementById('about').innerHTML = CONTENT.about;

            const footerContainer = document.getElementById('footer');
            let socialsHTML = '';
            CONTENT.socials.forEach(social => {
                socialsHTML += `
                    <a href="${social.url}" aria-label="${social.name}" target="_blank" rel="noopener noreferrer">
                        ${social.iconSvg}
                    </a>
                `;
            });
            footerContainer.innerHTML = socialsHTML;
        });

        function initHeroElements() {
            document.getElementById('hero').innerHTML = `
                <div class="crt-viewport glitching" id="crt-viewport">
                    <img src="${CONTENT.hero.imageA}" alt="${CONTENT.hero.altA}" class="crt-frame active" id="frame-a">
                    <img src="${CONTENT.hero.imageB}" alt="${CONTENT.hero.altB}" class="crt-frame" id="frame-b">
                    <div class="crt-scanlines"></div>
                    <div class="crt-flicker"></div>
                </div>
                <p class="hero-credit">${CONTENT.hero.credit}</p>
            `;
        }

        /* =========================
           INTERACTION & ACTIVATION CONTROLS
           ========================= */
        
        let isActivated = false;
        let sequenceTimeout = null;

        function activatePortfolio() {
            if (isActivated) return; 
            isActivated = true;

            // Trigger full visual shift (canvas gray shifts to midnight obsidian, monogram instantly vanishes)
            document.body.classList.add('content-revealed');
            
            setupScrollObserver();
            executeCrtSequence();
        }

        function deactivatePortfolio(event) {
            if (event) event.stopPropagation();
            
            isActivated = false;
            if (sequenceTimeout) clearTimeout(sequenceTimeout);

            // Revert document architecture back to original grey minimalist canvas with monogram
            document.body.classList.remove('content-revealed');
            document.body.classList.remove('work-section-open');

            document.getElementById('toggle-work-btn').innerText = "See work references";

            // Reset CRT simulation metrics cleanly
            initHeroElements();
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function executeCrtSequence() {
            const viewport = document.getElementById('crt-viewport');
            const frameA = document.getElementById('frame-a');
            const frameB = document.getElementById('frame-b');

            let switchCount = 0;
            const maxSwitches = 18;
            
            function runTick() {
                if (!isActivated) return;
                if (switchCount < maxSwitches) {
                    if (frameA.classList.contains('active')) {
                        frameA.classList.remove('active');
                        frameB.classList.add('active');
                    } else {
                        frameB.classList.remove('active');
                        frameA.classList.add('active');
                    }
                    switchCount++;
                    
                    let nextTick = Math.random() * 90 + 40; 
                    if (switchCount > maxSwitches - 6) {
                        nextTick += 120; 
                    }
                    sequenceTimeout = setTimeout(runTick, nextTick);
                } else {
                    frameA.classList.remove('active');
                    frameB.classList.add('active');
                    
                    viewport.classList.remove('glitching');
                    viewport.classList.add('final-state');
                }
            }

            sequenceTimeout = setTimeout(runTick, 200);
        }

        function toggleReferences() {
            const btn = document.getElementById('toggle-work-btn');
            
            if (document.body.classList.contains('work-section-open')) {
                document.body.classList.remove('work-section-open');
                btn.innerText = "See work references";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.body.classList.add('work-section-open');
                btn.innerText = "Back to About";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function setupScrollObserver() {
            const revealElements = document.querySelectorAll('.reveal');
            const revealOptions = {
                threshold: 0.05,
                rootMargin: "0px 0px -40px 0px"
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && isActivated) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, revealOptions);

            revealElements.forEach(el => observer.observe(el));
            
            setTimeout(() => {
                if (isActivated) document.getElementById('hero').classList.add('active');
            }, 50);
        }
    </script>
</body>
</html>
